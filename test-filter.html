<!DOCTYPE html>
<html>
<style>
  body { background: #0f172a; }
  svg { filter: invert(0.93) hue-rotate(180deg); background: white; }
</style>
<body>
  <svg width="200" height="200">
    <rect x="10" y="10" width="50" height="50" style="fill: white; stroke: black; stroke-width: 2;" />
    <rect x="70" y="10" width="50" height="50" style="fill: #f5cfcf; stroke: #ff0000; stroke-width: 2;" />
    <text x="10" y="80" style="fill: black;">Hello World</text>
  </svg>
</body>
</html>
